name: Publish to npm

# Triggers on every push to main, but only proceeds with `npm publish`
# when the version field in package.json is not yet on the npm registry.
# This means: bump the version in package.json -> commit -> push to main
# and the new version is published. No tags or GitHub Releases required.
on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

# Don't allow two publish runs to race against each other.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # npm Trusted Publishing requires npm CLI >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Read package metadata
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Detected $name@$version"

      - name: Check whether this version is already published
        id: check
        run: |
          name='${{ steps.pkg.outputs.name }}'
          version='${{ steps.pkg.outputs.version }}'
          published=$(npm view "$name@$version" version 2>/dev/null || true)
          if [ -n "$published" ]; then
            echo "::notice::$name@$version already exists on npm. Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$name@$version is not yet on npm. Will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.should_publish == 'true'
        run: npm ci

      - name: Build
        if: steps.check.outputs.should_publish == 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
