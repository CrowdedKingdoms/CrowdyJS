query UsersPaginated($query: String, $limit: Int, $offset: Int) {
  usersPaginated(query: $query, limit: $limit, offset: $offset) {
    items {
      userId
      email
      gamertag
      disambiguation
      isConfirmed
      createdAt
      grantEarlyAccess
      grantEarlyAccessOverride
      orgId
      externalId
      userType
      isSuperAdmin
    }
    pageInfo {
      totalCount
      limit
      offset
    }
  }
}
