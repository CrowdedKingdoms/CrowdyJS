mutation UpdateAccessTier($tierId: BigInt!, $input: UpdateAccessTierInput!) {
  updateAccessTier(tierId: $tierId, input: $input) {
    tierId
    appId
    name
    tierOrder
    isFree
    isDefault
    priceCents
    currency
    billingPeriod
    description
    permissionKeys
    status
    updatedAt
  }
}
